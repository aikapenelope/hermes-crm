<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

		<!-- PWA Manifest -->
		<link rel="manifest" href="/manifest.json" />

		<!-- Theme color — matches our #070707 background -->
		<meta name="theme-color" content="#070707" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#070707" />

		<!-- Standard favicon -->
		<link rel="icon" href="/favicon.png" type="image/png" />

		<!-- iOS / Safari PWA meta tags -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Hermes CRM" />
		<link rel="apple-touch-icon" href="/icon-192.png" />

		<!-- Android / Chrome -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="application-name" content="Hermes CRM" />

		<!-- Prevent phone number detection -->
		<meta name="format-detection" content="telephone=no" />

		<!-- Description for SEO / share -->
		<meta name="description" content="CRM para clientes de la plataforma Hermes" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="overscroll-none">
		<div id="svelte">%sveltekit.body%</div>
	</body>
</html>
