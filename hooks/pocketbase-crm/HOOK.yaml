name: pocketbase-crm
description: >
  Logs every inbound message and Hermes response to the PocketBase CRM
  `conversations` collection. Zero tokens — runs after Hermes has already
  replied, purely as a Python side-effect.

# Fires on every completed agent turn.
# gateway/run.py emits this hook with:
#   platform, user_id, chat_id, session_id, message (≤500 chars), response (≤500 chars)
events:
  - agent:end
